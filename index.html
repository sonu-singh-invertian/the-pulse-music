<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pulse | Music Curator Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            darkMode: 'class',
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0c10',
                        lightBg: '#f3f4f6',
                        neonCyan: '#00f7ff',
                        neonLime: '#39ff14',
                        cardBgDark: '#151c24',
                        cardBgLight: '#ffffff'
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px #00f7ff',
                        'neon-lime': '0 0 15px #39ff14',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-darkBg text-white dark:bg-darkBg dark:text-white transition-colors duration-300 font-sans antialiased" id="bodyTag">

    <!-- SIGN UP / LOGIN OVERLAY MODAL -->
    <div id="authModal" class="fixed inset-0 z-[100] flex items-center justify-center bg-black/90 backdrop-blur-lg px-4">
        <div class="bg-cardBgDark border border-gray-800 p-8 rounded-3xl w-full max-w-md shadow-neon-cyan relative text-white">
            <div class="text-center mb-6">
                <h2 class="text-3xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">
                    THE PULSE.
                </h2>
                <p id="modalSubtitle" class="text-gray-400 text-sm mt-1">Create an account to access the vault</p>
            </div>

            <!-- Auth Form -->
            <form id="authForm" onsubmit="handleAuth(event)" class="space-y-4">
                <div id="profileGroup" class="text-center">
                    <label class="text-xs uppercase font-bold text-gray-400 mb-2 block">Profile Picture (Optional)</label>
                    <div class="flex justify-center items-center gap-4">
                        <img id="avatarPreview" src="https://via.placeholder.com/80" class="w-16 h-16 rounded-full object-cover border-2 border-neonCyan">
                        <input type="file" id="profilePicInput" accept="image/*" onchange="previewProfilePic(event)" class="text-xs text-gray-400">
                    </div>
                </div>
                <div id="nameGroup">
                    <label class="text-xs uppercase font-bold text-gray-400 mb-1 block">Full Name</label>
                    <input type="text" id="userName" placeholder="Sonu Singh" class="w-full bg-darkBg border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neonCyan transition">
                </div>
                <div>
                    <label class="text-xs uppercase font-bold text-gray-400 mb-1 block">Email Address</label>
                    <input type="email" id="userEmail" required placeholder="user@example.com" class="w-full bg-darkBg border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neonCyan transition">
                </div>
                <div>
                    <label class="text-xs uppercase font-bold text-gray-400 mb-1 block">Password</label>
                    <input type="password" id="userPassword" required placeholder="••••••••" class="w-full bg-darkBg border border-gray-700 rounded-xl px-4 py-2.5 text-sm focus:outline-none focus:border-neonCyan transition">
                </div>

                <button type="submit" id="authBtn" class="w-full bg-gradient-to-r from-neonCyan to-neonLime text-black font-extrabold py-3 rounded-xl hover:shadow-neon-cyan transition duration-300 mt-2">
                    Sign Up
                </button>
            </form>

            <div class="text-center mt-6 text-sm text-gray-400">
                <span id="toggleText">Already have an account?</span>
                <button onclick="toggleAuthMode()" class="text-neonCyan font-bold ml-1 hover:underline focus:outline-none" id="toggleBtn">
                    Login
                </button>
            </div>
        </div>
    </div>

    <!-- MAIN WEBSITE CONTENT -->
    <div id="mainContent" class="hidden">
        
        <!-- 1. NAVIGATION BAR -->
        <nav class="sticky top-0 z-50 bg-darkBg/90 dark:bg-darkBg/90 backdrop-blur-md border-b border-gray-800 px-6 py-4 flex justify-between items-center gap-4">
            <div class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">
                THE PULSE.
            </div>
            
            <!-- Direct Search Form -->
            <form onsubmit="handleEnterSearch(event)" class="relative">
                <input type="text" id="searchInput" onkeyup="filterLocalTracks()" placeholder="Search site or press Enter..." class="bg-cardBgDark border border-gray-700 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:border-neonCyan transition w-40 md:w-72 text-white">
                <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-neonCyan hover:text-neonLime font-bold focus:outline-none">🔍</button>
            </form>

            <!-- User Controls (Dark Mode Toggle & Profile) -->
            <div class="flex items-center gap-3">
                <!-- Theme Toggle Button -->
                <button onclick="toggleTheme()" class="p-2 bg-cardBgDark border border-gray-700 rounded-full hover:border-neonCyan transition text-sm">
                    <span id="themeIcon">🌙</span>
                </button>

                <!-- Profile Pic & Logout -->
                <div class="flex items-center gap-2">
                    <label for="profilePicInputNav" class="cursor-pointer">
                        <img id="navAvatar" src="https://via.placeholder.com/40" class="w-8 h-8 rounded-full object-cover border border-neonLime hover:opacity-80 transition" title="Click to Change Photo">
                    </label>
                    <input type="file" id="profilePicInputNav" accept="image/*" onchange="updateProfilePicNav(event)" class="hidden">
                    <span id="displayUser" class="hidden md:inline text-xs font-bold text-neonLime bg-neonLime/10 border border-neonLime/30 px-3 py-1 rounded-full"></span>
                    <button onclick="logout()" class="text-xs bg-red-500/20 text-red-400 border border-red-500/30 px-3 py-1.5 rounded-full hover:bg-red-500 hover:text-white transition">
                        Logout
                    </button>
                </div>
            </div>
        </nav>

        <!-- 2. HERO SECTION -->
        <section class="relative min-h-[30vh] flex items-center justify-start px-8 md:px-16 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-neonCyan/10 via-darkBg to-darkBg">
            <div class="max-w-2xl space-y-4">
                <span class="text-xs uppercase tracking-widest bg-neonCyan/20 text-neonCyan px-3 py-1 rounded-full border border-neonCyan/30">Curated Vault</span>
                <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-none">
                    Welcome, <span id="welcomeUser" class="text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">Listener</span>
                </h1>
            </div>
        </section>

        <!-- 3. GENRE & CATEGORY FILTERS -->
        <section class="px-6 md:px-12 pt-6">
            <div class="flex items-center gap-3 overflow-x-auto no-scrollbar py-2">
                <button onclick="filterCategory('all')" class="category-btn bg-neonCyan text-black font-bold px-4 py-1.5 rounded-full text-xs transition">All Tracks</button>
                <button onclick="filterCategory('punjabi')" class="category-btn bg-cardBgDark border border-gray-700 text-gray-300 font-bold px-4 py-1.5 rounded-full text-xs hover:border-neonCyan transition">Punjabi</button>
                <button onclick="filterCategory('hindi')" class="category-btn bg-cardBgDark border border-gray-700 text-gray-300 font-bold px-4 py-1.5 rounded-full text-xs hover:border-neonLime transition">Hindi</button>
                <button onclick="filterCategory('romantic')" class="category-btn bg-cardBgDark border border-gray-700 text-gray-300 font-bold px-4 py-1.5 rounded-full text-xs hover:border-neonCyan transition">Romantic</button>
                <button onclick="filterCategory('hype')" class="category-btn bg-cardBgDark border border-gray-700 text-gray-300 font-bold px-4 py-1.5 rounded-full text-xs hover:border-neonLime transition">Hype / Gym</button>
                <button onclick="filterCategory('liked')" class="category-btn bg-red-500/20 text-red-400 border border-red-500/30 font-bold px-4 py-1.5 rounded-full text-xs hover:bg-red-500 hover:text-white transition">❤️ Liked Songs</button>
            </div>
        </section>

        <!-- 4. IN-SITE TRACKS VAULT -->
        <section id="fresh" class="py-8 px-6 md:px-12">
            <div class="flex justify-between items-center mb-6">
                <h2 class="text-2xl font-bold tracking-wide border-l-4 border-neonLime pl-3">Tracks Library</h2>
                <span id="searchResultText" class="text-sm text-neonLime font-semibold">Showing All Tracks</span>
            </div>
            
            <!-- Search Results Grid -->
            <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trackGrid">
                
                <!-- Track 1: Sidhu Moose Wala -->
                <div class="track-card bg-cardBgDark p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300 relative group" id="card-1" data-id="1" data-keywords="sidhu moose wala moosewala same beef punjabi hype car drive">
                    <button onclick="toggleLike(1)" class="like-btn absolute top-5 right-5 z-20 bg-black/70 p-2 rounded-full text-lg hover:scale-110 transition">🤍</button>
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2ZInwBwVv5YI1D44ZfA6Yg?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- Track 2: Darshan Raval - Asal Mein -->
                <div class="track-card bg-cardBgDark p-3 rounded-2xl border border-gray-800 hover:border-neonLime/50 transition duration-300 relative group" id="card-2" data-id="2" data-keywords="darshan raval asal mein hindi romantic chill sad love">
                    <button onclick="toggleLike(2)" class="like-btn absolute top-5 right-5 z-20 bg-black/70 p-2 rounded-full text-lg hover:scale-110 transition">🤍</button>
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/30wZfeZndX2I1v8VvJ236n?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- Track 3: Karan Aujla -->
                <div class="track-card bg-cardBgDark p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300 relative group" id="card-3" data-id="3" data-keywords="karan aujla softly punjabi pop hype drive">
                    <button onclick="toggleLike(3)" class="like-btn absolute top-5 right-5 z-20 bg-black/70 p-2 rounded-full text-lg hover:scale-110 transition">🤍</button>
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0u2P12333A35L33X33?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

                <!-- Track 4: Darshan Raval - Ek Tarfa -->
                <div class="track-card bg-cardBgDark p-3 rounded-2xl border border-gray-800 hover:border-neonLime/50 transition duration-300 relative group" id="card-4" data-id="4" data-keywords="darshan raval ek tarfa hindi romantic monsoon soulful love">
                    <button onclick="toggleLike(4)" class="like-btn absolute top-5 right-5 z-20 bg-black/70 p-2 rounded-full text-lg hover:scale-110 transition">🤍</button>
                    <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/6M46M6G4a6X1E3V5b75wLp?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
                </div>

            </div>
        </section>

        <!-- 5. FOOTER -->
        <footer class="border-t border-gray-900 py-8 text-center text-sm text-gray-500">
            <p>&copy; 2026 The Pulse Hub. Created with Neon Energy.</p>
        </footer>

    </div>

    <!-- LOGIC SCRIPT -->
    <script>
        let isSignUpMode = true;
        let uploadedPicBase64 = "https://via.placeholder.com/80";
        let likedSongs = JSON.parse(localStorage.getItem('pulse_liked')) || [];
        let isDarkMode = true;

        window.onload = function() {
            let loggedInUser = localStorage.getItem('pulse_user');
            if (loggedInUser) {
                let user = JSON.parse(loggedInUser);
                unlockSite(user.name, user.pic || "https://via.placeholder.com/80");
            }
            updateLikedUI();
        };

        // Theme Toggle Function
        function toggleTheme() {
            isDarkMode = !isDarkMode;
            let body = document.getElementById('bodyTag');
            let themeIcon = document.getElementById('themeIcon');

            if (isDarkMode) {
                body.classList.remove('bg-gray-100', 'text-black');
                body.classList.add('bg-darkBg', 'text-white');
                themeIcon.innerText = "🌙";
            } else {
                body.classList.remove('bg-darkBg', 'text-white');
                body.classList.add('bg-gray-100', 'text-black');
                themeIcon.innerText = "☀️";
            }
        }

        // Preview Profile Pic during Signup
        function previewProfilePic(event) {
            let reader = new FileReader();
            reader.onload = function() {
                uploadedPicBase64 = reader.result;
                document.getElementById('avatarPreview').src = reader.result;
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        // Update Profile Pic directly from Header
        function updateProfilePicNav(event) {
            let reader = new FileReader();
            reader.onload = function() {
                let newPic = reader.result;
                document.getElementById('navAvatar').src = newPic;
                
                let savedUser = JSON.parse(localStorage.getItem('pulse_user'));
                if (savedUser) {
                    savedUser.pic = newPic;
                    localStorage.setItem('pulse_user', JSON.stringify(savedUser));
                }
            }
            reader.readAsDataURL(event.target.files[0]);
        }

        function toggleAuthMode() {
            isSignUpMode = !isSignUpMode;
            document.getElementById('nameGroup').style.display = isSignUpMode ? 'block' : 'none';
            document.getElementById('profileGroup').style.display = isSignUpMode ? 'block' : 'none';
            document.getElementById('modalSubtitle').innerText = isSignUpMode ? 'Create an account to access the vault' : 'Welcome back! Login to continue';
            document.getElementById('authBtn').innerText = isSignUpMode ? 'Sign Up' : 'Login';
            document.getElementById('toggleText').innerText = isSignUpMode ? 'Already have an account?' : "Don't have an account?";
            document.getElementById('toggleBtn').innerText = isSignUpMode ? 'Login' : 'Sign Up';
        }

        function handleAuth(e) {
            e.preventDefault();
            let email = document.getElementById('userEmail').value;
            let password = document.getElementById('userPassword').value;
            let name = document.getElementById('userName').value || email.split('@')[0];

            if (isSignUpMode) {
                let userObj = { name: name, email: email, password: password, pic: uploadedPicBase64 };
                localStorage.setItem('pulse_user', JSON.stringify(userObj));
                alert("Account Created Successfully!");
                unlockSite(name, uploadedPicBase64);
            } else {
                let savedUser = localStorage.getItem('pulse_user');
                if (savedUser) {
                    let parsed = JSON.parse(savedUser);
                    if (parsed.email === email && parsed.password === password) {
                        unlockSite(parsed.name, parsed.pic || "https://via.placeholder.com/80");
                    } else {
                        alert("Invalid Email or Password!");
                    }
                } else {
                    alert("No account found. Please Sign Up first!");
                }
            }
        }

        function unlockSite(userName, userPic) {
            document.getElementById('authModal').classList.add('hidden');
            document.getElementById('mainContent').classList.remove('hidden');
            document.getElementById('displayUser').innerText = userName;
            document.getElementById('welcomeUser').innerText = userName;
            document.getElementById('navAvatar').src = userPic;
        }

        function logout() {
            localStorage.removeItem('pulse_user');
            location.reload();
        }

        // Live Filter Function
        function filterLocalTracks() {
            let input = document.getElementById('searchInput').value.toLowerCase().trim();
            let cards = document.getElementsByClassName('track-card');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                let keywords = cards[i].getAttribute('data-keywords').toLowerCase();
                if (keywords.includes(input)) {
                    cards[i].style.display = "block";
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            let resultText = document.getElementById('searchResultText');
            if (input === "") {
                resultText.innerText = "Showing All Tracks";
            } else if (visibleCount === 0) {
                resultText.innerText = "Press Enter to search on Spotify ↗";
            } else {
                resultText.innerText = `Found ${visibleCount} track(s) in site library`;
            }
        }

        // Category Filter Buttons
        function filterCategory(category) {
            let cards = document.getElementsByClassName('track-card');
            for (let i = 0; i < cards.length; i++) {
                if (category === 'all') {
                    cards[i].style.display = "block";
                } else if (category === 'liked') {
                    let cardId = parseInt(cards[i].getAttribute('data-id'));
                    cards[i].style.display = likedSongs.includes(cardId) ? "block" : "none";
                } else {
                    let keywords = cards[i].getAttribute('data-keywords').toLowerCase();
                    cards[i].style.display = keywords.includes(category) ? "block" : "none";
                }
            }
        }

        // Like / Favorite Songs System
        function toggleLike(id) {
            let card = document.getElementById(`card-${id}`);
            let btn = card.querySelector('.like-btn');

            if (likedSongs.includes(id)) {
                likedSongs = likedSongs.filter(item => item !== id);
                btn.innerText = "🤍";
            } else {
                likedSongs.push(id);
                btn.innerText = "❤️";
            }
            localStorage.setItem('pulse_liked', JSON.stringify(likedSongs));
        }

        function updateLikedUI() {
            likedSongs.forEach(id => {
                let card = document.getElementById(`card-${id}`);
                if (card) {
                    let btn = card.querySelector('.like-btn');
                    if (btn) btn.innerText = "❤️";
                }
            });
        }

        function handleEnterSearch(e) {
            e.preventDefault();
            let query = document.getElementById('searchInput').value.trim();
            if (query !== "") {
                window.open(`https://open.spotify.com/search/${encodeURIComponent(query)}`, '_blank');
            }
        }
    </script>
</body>
</html>
