<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pulse | Music Curator Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0c10',
                        neonCyan: '#00f7ff',
                        neonLime: '#39ff14',
                        cardBg: '#151c24'
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px #00f7ff',
                        'neon-lime': '0 0 15px #39ff14',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-darkBg text-white font-sans antialiased">

    <!-- 1. NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-darkBg/90 backdrop-blur-md border-b border-gray-800 px-6 py-4 flex justify-between items-center gap-4">
        <div class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">
            THE PULSE.
        </div>
        <div class="hidden md:flex space-x-8 font-medium tracking-wide">
            <a href="#featured" class="hover:text-neonCyan transition">Featured</a>
            <a href="#fresh" class="hover:text-neonLime transition">Fresh Drops</a>
            <a href="#moods" class="hover:text-neonCyan transition">Curated Moods</a>
        </div>
        <!-- Smart Search Form -->
        <form id="searchForm" onsubmit="handleGlobalSearch(event)" class="relative">
            <input type="text" id="searchInput" onkeyup="filterLocalTracks()" placeholder="Search site or press Enter..." class="bg-cardBg border border-gray-700 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:border-neonCyan transition w-44 md:w-64 text-white">
            <button type="submit" class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-neonCyan hover:text-neonLime font-bold">🔍</button>
        </form>
    </nav>

    <!-- 2. HERO SECTION (SPOTLIGHT) -->
    <section id="featured" class="relative min-h-[50vh] flex items-center justify-start px-8 md:px-16 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-neonCyan/10 via-darkBg to-darkBg">
        <div class="max-w-2xl space-y-6">
            <span class="text-xs uppercase tracking-widest bg-neonCyan/20 text-neonCyan px-3 py-1 rounded-full border border-neonCyan/30">Artist Spotlight</span>
            <h1 class="text-5xl md:text-7xl font-extrabold tracking-tight leading-none">
                The New <br><span class="text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">Wave</span>
            </h1>
            <p class="text-gray-400 text-lg">Curated heavy hitters, unreleased vibes, and late-night driving anthems.</p>
        </div>
    </section>

    <!-- 3. FRESH DROPS (SEARCHABLE TRACKS) -->
    <section id="fresh" class="py-12 px-6 md:px-12">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold tracking-wide border-l-4 border-neonLime pl-3">Fresh Beats</h2>
            <span id="searchResultText" class="text-sm text-neonLime">Showing All Tracks</span>
        </div>
        
        <!-- Grid with searchable Track Cards -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trackGrid">
            
            <!-- Track 1: Sidhu Moose Wala -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300" data-keywords="sidhu moose wala same beef punjabi hype">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2ZInwBwVv5YI1D44ZfA6Yg?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 2: Darshan Raval -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonLime/50 transition duration-300" data-keywords="darshan raval asal mein hindi romantic chill">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/30wZfeZndX2I1v8VvJ236n?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 3: Karan Aujla -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300" data-keywords="karan aujla softly punjabi pop hype">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/6L93oKeqxV2vGfL3hJp9C4?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

        </div>
    </section>

    <!-- 4. FOOTER -->
    <footer class="border-t border-gray-900 py-8 text-center text-sm text-gray-500">
        <p>&copy; 2026 The Pulse Hub. Created with Neon Energy.</p>
    </footer>

    <!-- SEARCH JAVASCRIPT LOGIC -->
    <script>
        // 1. Live Page Filtering Function
        function filterLocalTracks() {
            let input = document.getElementById('searchInput').value.toLowerCase();
            let cards = document.getElementsByClassName('track-card');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                let keywords = cards[i].getAttribute('data-keywords').toLowerCase();
                if (keywords.includes(input)) {
                    cards[i].style.display = "block";
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            let resultText = document.getElementById('searchResultText');
            if (input === "") {
                resultText.innerText = "Showing All Tracks";
            } else if (visibleCount === 0) {
                resultText.innerText = "No match on page. Press Enter to search on Spotify!";
            } else {
                resultText.innerText = `Found ${visibleCount} result(s) on page`;
            }
        }

        // 2. Global Spotify Search Redirect on Enter / Submit
        function handleGlobalSearch(event) {
            event.preventDefault(); // Stop page reload
            let query = document.getElementById('searchInput').value.trim();
            if (query !== "") {
                let spotifyUrl = `https://open.spotify.com/search/${encodeURIComponent(query)}`;
                window.open(spotifyUrl, '_blank'); // Open search in new tab
            }
        }
    </script>
</body>
</html>
