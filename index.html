<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>The Pulse | Music Curator Hub</title>
    <!-- Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <script>
        tailwind.config = {
            theme: {
                extend: {
                    colors: {
                        darkBg: '#0b0c10',
                        neonCyan: '#00f7ff',
                        neonLime: '#39ff14',
                        cardBg: '#151c24'
                    },
                    boxShadow: {
                        'neon-cyan': '0 0 15px #00f7ff',
                        'neon-lime': '0 0 15px #39ff14',
                    }
                }
            }
        }
    </script>
    <style>
        html { scroll-behavior: smooth; }
        .no-scrollbar::-webkit-scrollbar { display: none; }
        .no-scrollbar { -ms-overflow-style: none; scrollbar-width: none; }
    </style>
</head>
<body class="bg-darkBg text-white font-sans antialiased">

    <!-- 1. NAVIGATION BAR -->
    <nav class="sticky top-0 z-50 bg-darkBg/90 backdrop-blur-md border-b border-gray-800 px-6 py-4 flex justify-between items-center gap-4">
        <div class="text-2xl font-black tracking-wider text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">
            THE PULSE.
        </div>
        
        <!-- Live Instant Search Bar -->
        <div class="relative">
            <input type="text" id="searchInput" onkeyup="filterLocalTracks()" placeholder="Search artist, song, genre..." class="bg-cardBg border border-gray-700 rounded-full px-4 py-1.5 text-sm focus:outline-none focus:border-neonCyan transition w-56 md:w-80 text-white">
            <span class="absolute right-3 top-1/2 -translate-y-1/2 text-xs text-neonCyan">🔍</span>
        </div>
    </nav>

    <!-- 2. HERO SECTION -->
    <section class="relative min-h-[35vh] flex items-center justify-start px-8 md:px-16 bg-[radial-gradient(ellipse_at_top_right,_var(--tw-gradient-stops))] from-neonCyan/10 via-darkBg to-darkBg">
        <div class="max-w-2xl space-y-4">
            <span class="text-xs uppercase tracking-widest bg-neonCyan/20 text-neonCyan px-3 py-1 rounded-full border border-neonCyan/30">Curated Vault</span>
            <h1 class="text-4xl md:text-6xl font-extrabold tracking-tight leading-none">
                Explore The <span class="text-transparent bg-clip-text bg-gradient-to-r from-neonCyan to-neonLime">Sound Library</span>
            </h1>
            <p class="text-gray-400 text-sm md:text-base">Type any artist or vibe in the search bar to filter tracks in real-time.</p>
        </div>
    </section>

    <!-- 3. IN-SITE TRACKS VAULT -->
    <section id="fresh" class="py-10 px-6 md:px-12">
        <div class="flex justify-between items-center mb-6">
            <h2 class="text-2xl font-bold tracking-wide border-l-4 border-neonLime pl-3">Tracks Library</h2>
            <span id="searchResultText" class="text-sm text-neonLime font-semibold">Showing All Tracks</span>
        </div>
        
        <!-- Search Results Grid -->
        <div class="grid grid-cols-1 sm:grid-cols-2 lg:grid-cols-3 gap-6" id="trackGrid">
            
            <!-- Track 1: Sidhu Moose Wala - Same Beef -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300" data-keywords="sidhu moose wala same beef punjabi hype car drive">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/2ZInwBwVv5YI1D44ZfA6Yg?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 2: Darshan Raval - Asal Mein -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonLime/50 transition duration-300" data-keywords="darshan raval asal mein hindi romantic chill sad love">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/30wZfeZndX2I1v8VvJ236n?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 3: Karan Aujla - Softly -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300" data-keywords="karan aujla softly punjabi pop hype drive">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0u2P12333A35L33X33?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 4: Darshan Raval - Ek Tarfa -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonLime/50 transition duration-300" data-keywords="darshan raval ek tarfa hindi romantic monsoon soulful love">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/6M46M6G4a6X1E3V5b75wLp?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

            <!-- Track 5: AP Dhillon - Excuses -->
            <div class="track-card bg-cardBg p-3 rounded-2xl border border-gray-800 hover:border-neonCyan/50 transition duration-300" data-keywords="ap dhillon excuses punjabi brown munde party club">
                <iframe style="border-radius:12px" src="https://open.spotify.com/embed/track/0L893Osk0S3eAn4G3p011k?utm_source=generator&theme=0" width="100%" height="352" frameBorder="0" allowfullscreen="" allow="autoplay; clipboard-write; encrypted-media; fullscreen; picture-in-picture" loading="lazy"></iframe>
            </div>

        </div>

        <!-- Dynamic No Match Box -->
        <div id="noMatchBox" class="hidden text-center py-16 bg-cardBg/50 rounded-2xl border border-gray-800 mt-6">
            <p class="text-gray-400 text-lg">Aapka searched track library me nahi mila.</p>
            <button onclick="searchOnSpotify()" class="mt-4 bg-neonCyan text-black font-bold px-6 py-2.5 rounded-full hover:shadow-neon-cyan transition">
                Spotify Par Directly Search Karein ↗
            </button>
        </div>
    </section>

    <!-- 4. FOOTER -->
    <footer class="border-t border-gray-900 py-8 text-center text-sm text-gray-500">
        <p>&copy; 2026 The Pulse Hub. Created with Neon Energy.</p>
    </footer>

    <!-- IN-SITE LIVE FILTER SCRIPT -->
    <script>
        function filterLocalTracks() {
            let input = document.getElementById('searchInput').value.toLowerCase().trim();
            let cards = document.getElementsByClassName('track-card');
            let noMatchBox = document.getElementById('noMatchBox');
            let visibleCount = 0;

            for (let i = 0; i < cards.length; i++) {
                let keywords = cards[i].getAttribute('data-keywords').toLowerCase();
                if (keywords.includes(input)) {
                    cards[i].style.display = "block";
                    visibleCount++;
                } else {
                    cards[i].style.display = "none";
                }
            }

            let resultText = document.getElementById('searchResultText');
            
            if (input === "") {
                resultText.innerText = "Showing All Tracks";
                noMatchBox.classList.add('hidden');
            } else if (visibleCount === 0) {
                resultText.innerText = "No In-site match";
                noMatchBox.classList.remove('hidden');
            } else {
                resultText.innerText = `Found ${visibleCount} track(s) in site library`;
                noMatchBox.classList.add('hidden');
            }
        }

        function searchOnSpotify() {
            let query = document.getElementById('searchInput').value.trim();
            if (query !== "") {
                window.open(`https://open.spotify.com/search/${encodeURIComponent(query)}`, '_blank');
            }
        }
    </script>
</body>
</html>
